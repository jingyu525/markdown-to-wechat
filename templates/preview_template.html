<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 50%, #e5e7eb 100%);
            min-height: 100vh;
            line-height: 1.5;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            font-weight: 500;
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        
        .toast.show { display: flex; align-items: center; gap: 12px; }
        .toast.hide { animation: slideOut 0.3s ease-out forwards; }
        
        header {
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo svg { width: 24px; height: 24px; color: white; }
        
        .header-title { font-size: 20px; font-weight: 700; color: #1f2937; }
        .header-subtitle { font-size: 14px; color: #6b7280; }
        
        .header-right { display: flex; gap: 8px; }
        
        .btn-secondary {
            background: white;
            border: 2px solid #e5e7eb;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
        
        .btn-secondary svg { width: 20px; height: 20px; }
        
        main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 16px;
        }
        
        .action-bar {
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
        }
        
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 16px 32px;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        
        .btn-gradient svg { width: 24px; height: 24px; }
        
        .info-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        
        @media (max-width: 768px) {
            .info-cards { grid-template-columns: 1fr; }
        }
        
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease;
        }
        
        .info-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .info-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .info-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .info-icon svg { width: 24px; height: 24px; }
        .info-icon.blue { background: #dbeafe; color: #2563eb; }
        .info-icon.yellow { background: #fef3c7; color: #d97706; }
        .info-icon.green { background: #d1fae5; color: #059669; }
        
        .info-card h3 { font-weight: 600; color: #1f2937; }
        .info-card p { color: #4b5563; font-size: 14px; line-height: 1.6; }
        
        .content-container {
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .content-header {
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .content-header span:first-child { font-weight: 500; }
        .content-header span:last-child { font-size: 14px; opacity: 0.8; }
        
        .preview-content {
            max-height: 70vh;
            overflow-y: auto;
            padding: 40px;
        }
        
        .preview-content::-webkit-scrollbar { width: 8px; }
        .preview-content::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .preview-content::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 4px; }
        
        footer {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 16px;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path>
                    </svg>
                </div>
                <div>
                    <div class="header-title">{{TITLE}}</div>
                    <div class="header-subtitle">微信富文本预览</div>
                </div>
            </div>
            <div class="header-right">
                <button onclick="openInNewWindow()" class="btn-secondary">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                    <span>新窗口打开</span>
                </button>
                <button onclick="downloadHTML()" class="btn-secondary">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <span>下载HTML</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="action-bar">
            <button onclick="copyContent()" id="copyBtn" class="btn-gradient">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                </svg>
                <span>复制全部内容</span>
            </button>
        </div>

        <div class="info-cards">
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon blue">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h3>使用说明</h3>
                </div>
                <p>点击上方"复制全部内容"按钮，将内容复制到剪贴板，然后粘贴到微信公众号编辑器中。</p>
            </div>
            
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon yellow">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h3>注意事项</h3>
                </div>
                <p>请将文档中的图片上传到微信公众号素材库，然后替换对应的占位符链接。</p>
            </div>
            
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon green">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <h3>快速预览</h3>
                </div>
                <p>在浏览器中预览文章效果，确认样式和格式无误后再复制到微信公众号。</p>
            </div>
        </div>

        <div class="content-container">
            <div class="content-header">
                <span>文章内容预览</span>
                <span>以下内容可直接复制</span>
            </div>
            <div class="preview-content" id="contentArea">
                {{CONTENT}}
            </div>
        </div>
    </main>

    <div id="toast" class="toast">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span>内容已复制到剪贴板！</span>
    </div>

    <footer>
        <p>由 Markdown 转换生成 | 适用于微信公众号编辑器</p>
    </footer>

    <script>
        async function copyContent() {
            const content = document.getElementById('contentArea');
            const range = document.createRange();
            range.selectNode(content);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                const html = content.innerHTML;
                const blob = new Blob([html], { type: 'text/html' });
                const item = new ClipboardItem({ 'text/html': blob });
                await navigator.clipboard.write([item]);
                showToast('内容已复制到剪贴板！');
            } catch (err) {
                showToast('复制失败，请手动选择复制', 'error');
            }
            
            window.getSelection().removeAllRanges();
        }
        
        function showToast(message, type) {
            type = type || 'success';
            const toast = document.getElementById('toast');
            const toastText = toast.querySelector('span');
            
            toastText.textContent = message;
            toast.classList.remove('hide');
            toast.classList.add('show');
            
            if (type === 'error') {
                toast.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            } else {
                toast.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
            
            setTimeout(function() {
                toast.classList.remove('show');
                toast.classList.add('hide');
            }, 3000);
        }
        
        function openInNewWindow() {
            const content = document.getElementById('contentArea').innerHTML;
            const newWindow = window.open('', '_blank');
            newWindow.document.write('<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>预览</title></head><body style="padding: 40px; font-family: -apple-system, BlinkMacSystemFont, \'Segoe UI\', Roboto, sans-serif;">' + content + '</body></html>');
            newWindow.document.close();
        }
        
        function downloadHTML() {
            const content = document.getElementById('contentArea').innerHTML;
            const fullHtml = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{TITLE}}</title></head><body>' + content + '</body></html>';
            
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'article.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('HTML 文件已下载！');
        }
        
        document.addEventListener('keydown', function(e) {
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                copyContent();
            }
        });
    </script>
</body>
</html>
